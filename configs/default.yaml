# Default architecture config. All fields are optional -- missing fields keep
# the ArchConfig defaults. Tweak any value and re-run; the simulator picks up
# the new parameters without a rebuild.

clock_ghz: 1.0

systolic:
  rows: 256
  cols: 256
  precision: BF16          # FP8 | FP16 | BF16 | FP32
  bidirectional: true
  d_head: 128              # attention head dimension (= K streaming axis)
  # P0.1 dataflow / GEMM latency model:
  dataflow: weight_stationary   # weight_stationary | output_stationary
  weight_load_cycles: 0         # per-K-block weight load; 0 => auto (= rows)
  weight_double_buffer: true    # P1.4: hide weight-load(i+1) behind stream(i)

# P1.2 SRAM-pressure / partial-sum modeling (all default off — infinite SRAM,
# analytical in-array accumulation, single-buffered staging):
structural_k_tiling: false      # emit explicit per-K-block GEMMs + accumulate ops
model_sram: true               # bind IBUF+OBUF capacity; over-capacity sets spill
stage_double_buffer: true      # S2: overlap operand staging with compute

systolic_units: 2
vector_cores: 3
access_cores: 1

sram:
  ibuf_kb:           4096   # shared input buffer
  obuf_kb:           4096   # shared output buffer
  banking_factor:    8      # concurrent r/w ports per cycle
  private_vector_kb: 512    # per-vector-core private SRAM

hbm:
  bandwidth_tb_s: 2.0       # H100 ~3.35 TB/s; TPUv4 ~1.2 TB/s
  latency_cycles: 200
  pipelined: true           # P1.5: channel occupancy = bandwidth term only
                            #       (latency overlaps adjacent transfers)

dma:
  channels: 1

vector_core:
  simd_width:  64
  exp_latency: 4

access_core:
  bandwidth: 64
