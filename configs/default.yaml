# Default architecture config. All fields are optional -- missing fields keep
# the ArchConfig defaults. Tweak any value and re-run; the simulator picks up
# the new parameters without a rebuild.

clock_ghz: 1.0

systolic:
  rows: 128
  cols: 128
  precision: BF16          # FP8 | FP16 | BF16 | FP32
  bidirectional: false
  d_head: 128              # attention head dimension (= K streaming axis)

vector_cores: 3
access_cores: 1

sram:
  ibuf_kb:           4096   # shared input buffer
  obuf_kb:           4096   # shared output buffer
  banking_factor:    8      # concurrent r/w ports per cycle
  private_vector_kb: 512    # per-vector-core private SRAM

hbm:
  # TPUv2: 700 GB/s per chip at 700 MHz = ~1000 B/cycle.
  # TPUv3: ~900 GB/s. Using 0.9 TB/s as a TPUv3-like default.
  # Previous value of 2.0 TB/s was 2× too high (more like H100 territory).
  bandwidth_tb_s: 0.9
  # Real HBM access latency ~100-200 ns. At 1 GHz, 100 cycles is mid-range.
  latency_cycles: 100

dma:
  channels: 1

vector_core:
  # TPUv2 Norrie 2021 p.4: 128 vector lanes × 8 sublanes = 1024 ops/cycle.
  # Using 128 (one lane dimension) as a conservative single-core SIMD width.
  # Previous value of 64 made vector ops ~2-16× too slow.
  simd_width:  128
  # Real transcendental units (exp, log) pipeline depth ~10-20 cycles.
  # Previous value of 4 was too optimistic.
  exp_latency: 10

access_core:
  # TPUv2 Norrie 2021 p.5: Transpose/Permute Unit runs at memory bandwidth.
  # At ~1000 B/cycle HBM, BF16 = 500 elements/cycle. Using 256 conservatively.
  # Previous value of 64 was ~8× too slow.
  bandwidth: 256
