# configs/systolic_256.yaml
# 256×256 systolic array — use with any schedule.
# Run: ./build/apps/sim_main --config configs/systolic_256.yaml --schedule schedules/gemm_tiled.yaml

clock_ghz: 1.0

systolic:
  rows: 256
  cols: 256
  precision: BF16

vector_cores: 3
access_cores: 2

sram:
  ibuf_kb:           16384
  obuf_kb:           16384
  banking_factor:    8
  private_tandem_kb: 512

hbm:
  bandwidth_tb_s: 2.0
  latency_cycles: 200

dma:
  channels: 1
