llama:
  mode: prefill_decode
  prompt_len: 2048 
  generation_steps: 1
  num_layers: 32 
  num_q_heads: 32 
  num_kv_heads: 8 # num after grouping , GQA 
  gqa_group_size: 4
  head_dim: 128 #256
  hidden_dim: 4096 #head_dim
  intermediate_dim: 14336
  vocab_size: 128256
  max_seq_len: 8192 #actual llama model 128k
  dtype_bytes: 2  # BF16
  tile_rows: 256 #sys rows - match hw , dont match hw
  tile_cols: 256 #sys cols - match hw, dont match hw
  kv_cache_enabled: true
  kv_cache_location: hbm
